<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="800" height="200" fill="url(#bg)" rx="16"/>
  <rect width="800" height="200" fill="url(#grid)" rx="16"/>
  
  <!-- Subtle glow -->
  <circle cx="400" cy="100" r="150" fill="#38bdf8" opacity="0.1" filter="blur(20px)"/>
  
  <text x="400" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-1">Gemini Embedding 2 MCP Server</text>
  <text x="400" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#94a3b8" font-weight="500" text-anchor="middle" letter-spacing="0.5">Ultimate Multimodal &amp; Visual RAG Engine</text>
</svg>
